<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond bordeaux arrondi -->
  <rect width="64" height="64" rx="15" fill="#5E2129"/>

  <!-- Arche signature (fenêtre) -->
  <path d="M18 52 V30 A14 14 0 0 1 46 30 V52 Z" fill="#FBF5F0"/>

  <!-- Soleil couchant (golden hour) dans l'arche -->
